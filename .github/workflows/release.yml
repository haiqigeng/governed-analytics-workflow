name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate release
        run: |
          python tools/check_release.py --tag "$GITHUB_REF_NAME" --release-notes CHANGELOG.md
          python -m unittest discover -s tests -v
      - name: Build runtime package
        run: python tools/build_skill_package.py --output "dist/governed-analytics-workflow-$GITHUB_REF_NAME.zip"
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          files: dist/governed-analytics-workflow-*.zip
