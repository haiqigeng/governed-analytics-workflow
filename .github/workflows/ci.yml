name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate repository and runtime contract
        run: python tools/check_release.py --release-notes CHANGELOG.md
      - name: Run tests
        run: python -m unittest discover -s tests -v
      - name: Compile Python utilities
        run: python -m compileall -q scripts tools tests
